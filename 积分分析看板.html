<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天梯赛积分流水分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(90deg, #F26522 0%, #ff8c42 100%);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #F26522;
        }
        .stat-card .label { color: #aaa; margin-top: 5px; }
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
        }
        .chart-title {
            font-size: 16px;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 3px solid #F26522;
        }
        .chart-container { height: 300px; }
        .table-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
        }
        .table-title {
            font-size: 16px;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 3px solid #F26522;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(242, 101, 34, 0.3); padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        tr:hover { background: rgba(255,255,255,0.05); }
        .table-wrapper { max-height: 400px; overflow-y: auto; }
        @media (max-width: 900px) {
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>天梯赛积分流水分析</h1>
        <p id="updateTime">数据更新时间：--</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" id="totalRecords">--</div>
            <div class="label">积分流水记录</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalPoints">--</div>
            <div class="label">积分发放总量</div>
        </div>
        <div class="stat-card">
            <div class="value" id="avgPoints">--</div>
            <div class="label">场均积分</div>
        </div>
        <div class="stat-card">
            <div class="value" id="uniquePlayers">--</div>
            <div class="label">活跃玩家数</div>
        </div>
        <div class="stat-card">
            <div class="value" id="uniqueVenues">--</div>
            <div class="label">活跃球馆数</div>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-card">
            <div class="chart-title">积分类型分布</div>
            <div class="chart-container" id="typeChart"></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">球馆活跃度 Top10</div>
            <div class="chart-container" id="venueChart"></div>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-card">
            <div class="chart-title">积分区间分布</div>
            <div class="chart-container" id="rangeChart"></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">每日积分趋势</div>
            <div class="chart-container" id="trendChart"></div>
        </div>
    </div>

    <div class="table-section">
        <div class="table-title">积分流水明细（最近100条）</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>球馆</th>
                        <th>用户ID</th>
                        <th>昵称</th>
                        <th>类型</th>
                        <th>积分</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 从JSON文件加载数据
        let pointsData = [];
        
        async function loadData() {
            try {
                const response = await fetch('points_data.json');
                pointsData = await response.json();
                console.log('加载了', pointsData.length, '条数据');
                updateDashboard();
            } catch (err) {
                console.error('加载数据失败:', err);
                document.getElementById('totalRecords').textContent = '加载失败';
            }
        }

        function updateDashboard() {
            if (!pointsData || pointsData.length === 0) return;

            document.getElementById('updateTime').textContent = '数据更新时间: ' + new Date().toLocaleString();

            // 基础统计
            document.getElementById('totalRecords').textContent = pointsData.length;
            
            const totalPoints = pointsData.reduce((sum, p) => sum + (p['积分变动'] || 0), 0);
            document.getElementById('totalPoints').textContent = totalPoints.toLocaleString();
            
            const avgPoints = Math.round(totalPoints / pointsData.length);
            document.getElementById('avgPoints').textContent = avgPoints;
            
            const players = new Set(pointsData.map(p => p['用户ID'])).size;
            document.getElementById('uniquePlayers').textContent = players;
            
            const venues = new Set(pointsData.map(p => p['球馆名称'])).size;
            document.getElementById('uniqueVenues').textContent = venues;

            // 图表：积分类型分布
            const typeChart = echarts.init(document.getElementById('typeChart'));
            const typeCounts = {};
            pointsData.forEach(p => {
                const type = p['标题'] || '其他';
                typeCounts[type] = (typeCounts[type] || 0) + 1;
            });
            typeChart.setOption({
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: '60%',
                    data: Object.entries(typeCounts).map(([name, value]) => ({ name, value }))
                }]
            });

            // 图表：球馆活跃度
            const venueChart = echarts.init(document.getElementById('venueChart'));
            const venueCounts = {};
            pointsData.forEach(p => {
                const venue = p['球馆名称'] || '未知';
                venueCounts[venue] = (venueCounts[venue] || 0) + 1;
            });
            const topVenues = Object.entries(venueCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
            venueChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'value' },
                yAxis: { 
                    type: 'category', 
                    data: topVenues.map(v => v[0].substring(0, 10)).reverse()
                },
                series: [{
                    type: 'bar',
                    data: topVenues.map(v => v[1]).reverse(),
                    itemStyle: { color: '#00CED1' }
                }]
            });

            // 图表：积分区间
            const rangeChart = echarts.init(document.getElementById('rangeChart'));
            const ranges = { '1-10': 0, '11-20': 0, '21-50': 0, '51-100': 0, '100+': 0 };
            pointsData.forEach(p => {
                const pts = p['积分变动'] || 0;
                if (pts <= 10) ranges['1-10']++;
                else if (pts <= 20) ranges['11-20']++;
                else if (pts <= 50) ranges['21-50']++;
                else if (pts <= 100) ranges['51-100']++;
                else ranges['100+']++;
            });
            rangeChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: Object.keys(ranges) },
                yAxis: { type: 'value' },
                series: [{
                    type: 'bar',
                    data: Object.values(ranges),
                    itemStyle: { color: '#FFD700' }
                }]
            });

            // 图表：每日趋势
            const trendChart = echarts.init(document.getElementById('trendChart'));
            const dailyCounts = {};
            pointsData.forEach(p => {
                const date = (p['记录时间'] || '').split(' ')[0];
                if (date) dailyCounts[date] = (dailyCounts[date] || 0) + 1;
            });
            const sortedDates = Object.keys(dailyCounts).sort();
            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { 
                    type: 'category', 
                    data: sortedDates.slice(-30),
                    axisLabel: { rotate: 45, fontSize: 10 }
                },
                yAxis: { type: 'value' },
                series: [{
                    type: 'line',
                    data: sortedDates.slice(-30).map(d => dailyCounts[d]),
                    smooth: true,
                    areaStyle: { opacity: 0.3 },
                    itemStyle: { color: '#F26522' }
                }]
            });

            // 数据表格
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = pointsData.slice(0, 100).map(p => `
                <tr>
                    <td>${p['球馆名称'] || '--'}</td>
                    <td>${p['用户ID'] || '--'}</td>
                    <td>${p['用户昵称'] || '--'}</td>
                    <td>${p['标题'] || '--'}</td>
                    <td style="color: #00C853;">+${p['积分变动'] || 0}</td>
                    <td>${p['记录时间'] || '--'}</td>
                </tr>
            `).join('');
        }

        // 页面加载时执行
        loadData();
    </script>
</body>
</html>
